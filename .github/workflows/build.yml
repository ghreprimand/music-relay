name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch AppImage with version metadata and create stable-named copy
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cd target/release/bundle/appimage
          VERSIONED=$(ls *.AppImage)
          VERSION=$(grep '"version"' ../../../../src-tauri/tauri.conf.json | head -1 | sed 's/.*: *"\(.*\)".*/\1/')

          # Extract, patch .desktop with X-AppImage-Version, repack
          chmod +x "$VERSIONED"
          ./"$VERSIONED" --appimage-extract > /dev/null 2>&1
          for desktop in squashfs-root/*.desktop squashfs-root/usr/share/applications/*.desktop; do
            [ -f "$desktop" ] && echo "X-AppImage-Version=$VERSION" >> "$desktop"
          done

          # Download appimagetool to repack
          curl -fsSL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --no-appstream squashfs-root "$VERSIONED"
          cp "$VERSIONED" Music_Relay.AppImage
          rm -rf squashfs-root appimagetool

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform }}
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/msi/*.msi
            target/release/bundle/dmg/*.dmg

  build-headless:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: relay-headless
          - platform: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            binary: relay-headless
            cross: true

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.cross
        run: cargo install cross

      - name: Build headless (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} -p relay-headless

      - name: Build headless (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p relay-headless

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.binary }}-${{ matrix.target }}

      - name: Upload headless artifact
        uses: actions/upload-artifact@v4
        with:
          name: headless-${{ matrix.target }}
          path: dist/

  release:
    needs: [build-tauri, build-headless]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Extract release notes
        id: notes
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## ${VERSION//./\\.}\$/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file to preserve formatting
          echo "$NOTES" > release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Music Relay ${{ github.ref_name }}"
          body_path: release-notes.md
          draft: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/relay-headless-*
